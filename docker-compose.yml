# ============================================================
# GenBI: PostgreSQL + OpenSearch + Spring Boot
#
# WebSocket 測試 Test WebSocket:
#   wscat -c ws://localhost:8080/qa/ws
# ============================================================

services:
  # --- PostgreSQL 資料庫 ---
  postgres:
    image: postgres:16
    container_name: genbi-postgres
    environment:
      POSTGRES_DB: gen_bi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- OpenSearch (向量搜尋 / RAG) ---
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: genbi-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 15

  # --- OpenSearch Dashboards (管理 UI，可選) ---
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: genbi-opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  # --- Spring Boot App ---
  app:
    build: .
    container_name: genbi-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/gen_bi
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      AOS_HOST: opensearch
      AOS_PORT: 9200
      AOS_USERNAME: admin
      AOS_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy

volumes:
  postgres-data:
  opensearch-data:
