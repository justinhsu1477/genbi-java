# ============================================================
# NLQ GenBI: MySQL + OpenSearch + Spring Boot
#
# WebSocket 測試 Test WebSocket:
#   wscat -c ws://localhost:8080/qa/ws
# ============================================================

services:
  # --- MySQL 資料庫 ---
  mysql:
    image: mysql:8.0
    container_name: nlq-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: nlq_demo
      MYSQL_USER: nlq
      MYSQL_PASSWORD: nlq123
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- OpenSearch (向量搜尋 / RAG) ---
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: nlq-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 15

  # --- OpenSearch Dashboards (管理 UI，可選) ---
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: nlq-opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  # --- Spring Boot App ---
  app:
    build: .
    container_name: nlq-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:mysql://mysql:3306/nlq_demo
      DB_USER: nlq
      DB_PASS: nlq123
      AOS_HOST: opensearch
      AOS_PORT: 9200
      AOS_USERNAME: admin
      AOS_PASSWORD: admin
    depends_on:
      mysql:
        condition: service_healthy
      opensearch:
        condition: service_healthy

volumes:
  mysql-data:
  opensearch-data:
