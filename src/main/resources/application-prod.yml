# ============================================================
# PROD 正式環境 — Real Bedrock, Prod database, Real OpenSearch
# PROD profile — Real Bedrock, Prod DB, Real OpenSearch
# ============================================================

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.lndata.genbi: WARN
    root: INFO
