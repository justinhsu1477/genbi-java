# ============================================================
# QAS 測試環境 — Real Bedrock, QA database, Real OpenSearch
# QAS profile — Real Bedrock, QA DB, Real OpenSearch
#
# 本地用 Docker OpenSearch:
#   AOS_SCHEME=http AOS_HOST=localhost ./mvnw spring-boot:run --spring.profiles.active=qas
# ============================================================

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.lndata.genbi: INFO
