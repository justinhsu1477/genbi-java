# ============================================================
# QAS 測試環境 — Real Bedrock, QA database, Real OpenSearch
# QAS profile — Real Bedrock, QA DB, Real OpenSearch
# ============================================================

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gen_bi}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.lndata.genbi: INFO
