# ============================================================
# DEV 開發環境 — Mock LLM, 本機 PostgreSQL, 無 OpenSearch
# DEV profile — Mock LLM, local PostgreSQL, no OpenSearch
# ============================================================

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gen_bi}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.lndata.genbi: DEBUG
    org.hibernate.SQL: DEBUG
