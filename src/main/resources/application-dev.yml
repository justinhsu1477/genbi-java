spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/nlq_demo}
    username: ${DB_USER:nlq}
    password: ${DB_PASS:nlq123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.nlq: DEBUG
    org.hibernate.SQL: DEBUG
